<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الصيانة الدورية | حسبة موتر</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --text-main: #2d3748;
            --text-muted: #718096;
            --card-bg: #ffffff;
            --body-bg: #f7fafc;
            --radius: 16px;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--body-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: var(--bg-gradient);
            color: #ffffff;
            padding: 24px 0 60px 0;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            text-align: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .back-btn:hover { background-color: rgba(255, 255, 255, 0.25); transform: translateX(4px); }

        header h1 { font-size: 26px; font-weight: 900; }
        header h1 span { color: #38bdf8; }

        .calculator-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px 24px;
            box-shadow: var(--shadow);
            margin-top: -30px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 15px;
            color: #4a5568;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            text-align: right;
        }

        .form-group input:focus { border-color: var(--primary-color); }

        .calc-btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .calc-btn:hover { background-color: var(--primary-hover); }

        .results-box {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px dashed #edf2f7;
            display: none;
        }

        .schedule-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 16px;
            text-align: center;
            background-color: #eff6ff;
            padding: 8px;
            border-radius: 8px;
        }

        .maintenance-list {
            list-style: none;
        }

        .maintenance-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 8px;
            border-bottom: 1px solid #edf2f7;
            font-size: 15px;
        }
        .maintenance-item:last-child { border-bottom: none; }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .badge.change { background-color: #fee2e2; color: #ef4444; }
        .badge.check { background-color: #fef3c7; color: #d97706; }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <a href="index.html" class="back-btn"><span>◀</span> العودة للرئيسية</a>
            <h1>جدول الصيانة <span>الدورية</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="calculator-box">
            
            <div class="form-group">
                <label for="mileage">ممشى السيارة الحالي بالكيلومتر (كم):</label>
                <input type="number" id="mileage" inputmode="numeric" placeholder="مثال: 65000" min="0">
            </div>

            <button class="calc-btn" onclick="generateSchedule()">اكتشف الصيانة المطلوبة 🛠️</button>

            <div class="results-box" id="results">
                <div class="schedule-title" id="currentIntervalTitle">صيانة الـ 0 كم</div>
                <ul class="maintenance-list" id="maintenanceItems">
                    <!-- تضاف العناصر برمجياً هنا -->
                </ul>
            </div>

        </div>
    </main>

    <script>
        function generateSchedule() {
            const mileage = parseInt(document.getElementById('mileage').value);

            if (isNaN(mileage) || mileage < 0) {
                alert("الرجاء إدخال قراءة ممشى صحيحة");
                return;
            }

            // تحديد أقرب صيانة دورية (مضاعفات 10 آلاف)
            const interval = Math.floor(mileage / 10000) * 10000;
            document.getElementById('currentIntervalTitle').innerText = "القطع والزيوت الواجب فحصها بناءً على ممشى سيارتك:";

            const listContainer = document.getElementById('maintenanceItems');
            listContainer.innerHTML = ''; // تفريغ القائمة القديمة

            // القطع الثابتة في كل 10 آلاف كم
            let items = [
                { text: "زيت المحرك وفلتر الزيت (السيفون)", type: "change", typeText: "تغيير إلزامي" },
                { text: "فلتر هواء المحرك وفلتر صالون المكيف", type: "check", typeText: "فحص/تنظيف" },
                { text: "منظومة الفرامل (الفحمات والهوبات)", type: "check", typeText: "فحص سماكة" },
                { text: "مستوى السوائل (ماء الرديتر، زيت الفرامل، مساحات الزجاج)", type: "check", typeText: "فحص وتزويد" }
            ];

            // إضافات صيانة الـ 20 ألف ومضاعفاتها
            if (mileage >= 20000 && mileage % 20000 === 0 || (mileage % 40000 === 20000)) {
                items.push({ text: "تدوير الكفرات (الإطارات) لضمان تماثل التآكل", type: "check", typeText: "إجراء دوري" });
                items.push({ text: "تربيط ومراجعة أسفل السيارة (المقصات والمساعدات)", type: "check", typeText: "فحص" });
            }

            // إضافات صيانة الـ 40 ألف ومضاعفاتها (مهمة جداً)
            if (mileage >= 40000 && mileage % 40000 === 0) {
                items.push({ text: "فلتر هواء المحرك وفلتر المكيف بالكامل", type: "change", typeText: "تغيير" });
                items.push({ text: "زيت ناقل الحركة (القير) والفلتر الخاص به", type: "change", typeText: "تغيير مهم" });
                items.push({ text: "سائل تبريد المحرك (ماء الرديتر الرئيسي)", type: "change", typeText: "تغيير" });
            }

            // إضافات صيانة الـ 80 ألف والـ 100 ألف كم (الصيانة الكبرى)
            if (mileage >= 80000 && mileage % 80000 === 0) {
                items.push({ text: "شمعات الاحتراق (البواجي)", type: "change", typeText: "تغيير" });
                items.push({ text: "سير المحرك الخارجي والداخلي (سير التايمنق)", type: "change", typeText: "تغيير حرج" });
                items.push({ text: "فلتر الوقود (البنزين/الديزل)", type: "change", typeText: "تغيير" });
            }

            // بناء العناصر وعرضها بشكل فخم ومميز بالرموز والألوان التنبيهية
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'maintenance-item';
                li.innerHTML = `
                    <span class="badge ${item.type}">${item.typeText}</span>
                    <span>${item.text}</span>
                `;
                listContainer.appendChild(li);
            });

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>

</html>
