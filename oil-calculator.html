<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة تغيير الزيت | حسبة موتر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --text-main: #2d3748;
            --text-muted: #718096;
            --card-bg: #ffffff;
            --body-bg: #f7fafc;
            --radius: 16px;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--body-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: var(--bg-gradient);
            color: #ffffff;
            padding: 24px 0 60px 0;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            text-align: center;
        }

        /* الزر التفاعلي الفخم للعودة للرئيسية */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: translateX(4px);
        }

        .back-btn span {
            font-size: 11px;
        }

        header h1 { font-size: 26px; font-weight: 900; }
        header h1 span { color: #38bdf8; }

        .calculator-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px 24px;
            box-shadow: var(--shadow);
            margin-top: -30px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 15px;
            color: #4a5568;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            text-align: right;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .calc-btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .calc-btn:hover { background-color: var(--primary-hover); }

        .results-box {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px dashed #edf2f7;
            display: none;
        }

        .alert-card {
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .result-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 12px;
        }

        .result-card h4 {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-card .value {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary-color);
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <a href="index.html" class="back-btn">
                <span>◀</span> العودة للرئيسية
            </a>
            <h1>حاسبة تغيير <span>الزيت</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="calculator-box">
            
            <div class="form-group">
                <label for="currentKm">قراءة عداد السيارة الحالي (كم):</label>
                <input type="number" id="currentKm" inputmode="numeric" placeholder="مثال: 150000">
            </div>

            <div class="form-group">
                <label for="lastChangeKm">قراءة العداد عند آخر تغيير للزيت (كم):</label>
                <input type="number" id="lastChangeKm" inputmode="numeric" placeholder="مثال: 142000">
            </div>

            <div class="form-group">
                <label for="oilType">نوع الزيت المستخدم الحالي:</label>
                <select id="oilType">
                    <option value="5000">زيت ممشى 5,000 كيلومتر</option>
                    <option value="10000">زيت ممشى 10,000 كيلومتر</option>
                </select>
            </div>

            <button class="calc-btn" onclick="calculateOil()">احسب موعد التغيير 🛢️</button>

            <div class="results-box" id="results">
                
                <div id="statusAlert" class="alert-card"></div>

                <div class="result-card">
                    <h4>يجب تغيير الزيت القادم عند عداد:</h4>
                    <div class="value" id="nextChangeValue">0 كم</div>
                </div>

                <div class="result-card">
                    <h4>المسافة المتبقية المتاحة لك:</h4>
                    <div class="value" id="remainingValue">0 كم</div>
                </div>

            </div>

        </div>
    </main>

    <script>
        function calculateOil() {
            const currentKm = parseInt(document.getElementById('currentKm').value);
            const lastChangeKm = parseInt(document.getElementById('lastChangeKm').value);
            const oilDistance = parseInt(document.getElementById('oilType').value);

            if (isNaN(currentKm) || isNaN(lastChangeKm) || currentKm <= 0 || lastChangeKm <= 0) {
                alert("الرجاء إدخال أرقام صحيحة");
                return;
            }

            if (currentKm < lastChangeKm) {
                alert("عفوًا! لا يمكن أن يكون الممشى الحالي أقل من الممشى عند آخر تغيير.");
                return;
            }

            const nextChangeKm = lastChangeKm + oilDistance;
            const remainingKm = nextChangeKm - currentKm;

            document.getElementById('nextChangeValue').innerText = nextChangeKm.toLocaleString() + " كم";
            const alertCard = document.getElementById('statusAlert');

            if (remainingKm <= 0) {
                alertCard.style.backgroundColor = "#fef2f2";
                alertCard.style.borderColor = "#fca5a5";
                alertCard.style.color = "#dc2626";
                alertCard.innerText = "تنبيه: لقد تجاوزت الممشى المسموح! يجب تغيير الزيت فورًا.";
                document.getElementById('remainingValue').innerText = "تجاوزت بـ " + Math.abs(remainingKm).toLocaleString() + " كم";
                document.getElementById('remainingValue').style.color = "#dc2626";
            } else if (remainingKm <= 1000) {
                alertCard.style.backgroundColor = "#fffbeb";
                alertCard.style.borderColor = "#fde68a";
                alertCard.style.color = "#d97706";
                alertCard.innerText = "تذكير: اقترب موعد تغيير الزيت، يفضل التجهيز لتغييره قريبًا.";
                document.getElementById('remainingValue').innerText = remainingKm.toLocaleString() + " كم متبقي";
                document.getElementById('remainingValue').style.color = "#d97706";
            } else {
                alertCard.style.backgroundColor = "#f0fdf4";
                alertCard.style.borderColor = "#bbf7d0";
                alertCard.style.color = "#16a34a";
                alertCard.innerText = "وضع الزيت ممتاز: يمكنك القيادة بأمان، الزيت في حالة جيدة.";
                document.getElementById('remainingValue').innerText = remainingKm.toLocaleString() + " كم متبقي";
                document.getElementById('remainingValue').style.color = "#16a34a";
            }

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>

</html>
