<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمويه جزء من الفيديو</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:30px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

video{
width:100%;
margin-top:20px;
border-radius:8px;
}

input{
margin-top:20px;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
cursor:pointer;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
}

button:hover{
background:#0b5ed7;
}
</style>

</head>
<body>

<div class="container">

<h1>🎬 تمويه جزء من الفيديو</h1>

<p>ارفع الفيديو وسيظهر هنا.</p>

<input type="file" id="videoInput" accept="video/*">

<video id="video" controls></video>

<br>

<button onclick="alert('الخطوة القادمة سنضيف التمويه الحقيقي')">
معالجة الفيديو
</button>

</div>

<script>

const input=document.getElementById("videoInput");
const video=document.getElementById("video");

input.onchange=function(){

const file=this.files[0];

if(file){

video.src=URL.createObjectURL(file);

}

}

</script>

</body>
</html>
