<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أداة تمويه احترافية ومجانية</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .video-wrapper { position: relative; display: inline-block; margin-top: 15px; max-width: 100%; }
        video { display: block; max-width: 100%; border-radius: 4px; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .controls { margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center; }
        .blur-box { position: absolute; border: 2px dashed #3498db; cursor: move; box-sizing: border-box; }
        input[type="range"] { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>أداة التمويه الاحترافي المطور</h2>
    <input type="file" id="videoUpload" accept="video/*">
    
    <div class="controls">
        <label>قوة التمويه:</label>
        <input type="range" id="blurSize" min="5" max="30" value="15">
        <button id="toggleType">تغيير النوع (ضبابي / بكسل)</button>
    </div>

    <div class="video-wrapper" id="wrapper">
        <video id="myVideo" controls></video>
        <canvas id="blurCanvas"></canvas>
        <!-- مربع التحكم بمكان التمويه فوق الفيديو -->
        <div id="blurOverlay" class="blur-box" style="width: 120px; height: 120px; top: 20px; left: 20px;"></div>
    </div>
</div>

<script>
const video = document.getElementById('myVideo');
const canvas = document.getElementById('blurCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('blurOverlay');
const wrapper = document.getElementById('wrapper');
const blurSizeInput = document.getElementById('blurSize');
const toggleTypeBtn = document.getElementById('toggleType');

let isPixelating = true; 
let isDragging = false;
let startX, startY, startLeft, startTop;

// 1. تشغيل الفيديو المرفوع وضبط قياسات الكانفاس تلقائياً
document.getElementById('videoUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        };
    }
});

// 2. تحريك مربع التمويه بالفأرة لتحديد المكان بدقة
overlay.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startLeft = overlay.offsetLeft;
    startTop = overlay.offsetTop;
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    let newLeft = startLeft + (e.clientX - startX);
    let newTop = startTop + (e.clientY - startY);
    
    // منع خروج المربع عن حدود الفيديو
    newLeft = Math.max(0, Math.min(newLeft, wrapper.clientWidth - overlay.clientWidth));
    newTop = Math.max(0, Math.min(newTop, wrapper.clientHeight - overlay.clientHeight));
    
    overlay.style.left = newLeft + 'px';
    overlay.style.top = newTop + 'px';
});

document.addEventListener('mouseup', () => isDragging = false);

// 3. معالجة وتطبيق التمويه الاحترافي إطار بإطار (Frame by Frame)
function processBlur() {
    if (video.paused || video.ended) {
        requestAnimationFrame(processBlur);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // حساب نسب الأبعاد بين حجم الفيديو الحقيقي وحجمه المعروض على الشاشة
    const scaleX = video.videoWidth / video.clientWidth;
    const scaleY = video.videoHeight / video.clientHeight;

    const x = overlay.offsetLeft * scaleX;
    const y = overlay.offsetTop * scaleY;
    const w = overlay.clientWidth * scaleX;
    const h = overlay.clientHeight * scaleY;
    const size = parseInt(blurSizeInput.value);

    if (w > 0 && h > 0) {
        if (isPixelating) {
            // تأثير تمويه البكسل الاحترافي (Mosaic)
            ctx.drawImage(video, x, y, w, h, x, y, w, h);
            let imgData = ctx.getImageData(x, y, w, h);
            let data = imgData.data;

            for (let r = 0; r < h; r += size) {
                for (let c = 0; c < w; c += size) {
                    let pixelIndex = (r * w + c) * 4;
                    let red = data[pixelIndex];
                    let green = data[pixelIndex + 1];
                    let blue = data[pixelIndex + 2];

                    for (let br = 0; br < size && r + br < h; br++) {
                        for (let bc = 0; bc < size && c + bc < w; bc++) {
                            let bi = ((r + br) * w + (c + bc)) * 4;
                            data[bi] = red;
                            data[bi + 1] = green;
                            data[bi + 2] = blue;
                        }
                    }
                }
            }
            ctx.putImageData(imgData, x, y);
        } else {
            // تأثير التمويه الضبابي الناعم (Gaussian)
            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.clip();
            ctx.filter = `blur(${size}px)`;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
    }

    requestAnimationFrame(processBlur);
}

video.addEventListener('play', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    processBlur();
});

toggleTypeBtn.addEventListener('click', () => {
    isPixelating = !isPixelating;
});
</script>

</body>
</html>
