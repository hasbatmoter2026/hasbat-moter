<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقارنة مقاسات الإطارات | حسبة موتر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --text-main: #2d3748;
            --text-muted: #718096;
            --card-bg: #ffffff;
            --body-bg: #f7fafc;
            --radius: 16px;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            --accent-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--body-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: var(--bg-gradient);
            color: #ffffff;
            padding: 24px 0 60px 0;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            text-align: center;
        }

        /* الزر التفاعلي الفخم للعودة للرئيسية */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: translateX(4px);
        }

        .back-btn span {
            font-size: 11px;
        }

        header h1 { font-size: 26px; font-weight: 900; }
        header h1 span { color: var(--accent-color); }

        .calculator-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px 24px;
            box-shadow: var(--shadow);
            margin-top: -30px;
            margin-bottom: 40px;
        }

        .tyre-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 480px) {
            .tyre-sections { grid-template-columns: 1fr; }
        }

        .tyre-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 12px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 6px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #4a5568;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            text-align: center;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .calc-btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .calc-btn:hover { background-color: var(--primary-hover); }

        .results-box {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px dashed #edf2f7;
            display: none;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            font-size: 15px;
        }

        .result-row:last-child { border-bottom: none; }

        .result-row .label { font-weight: 600; color: #4a5568; }
        .result-row .diff { font-weight: 700; color: #e53e3e; }
        .result-row .diff.safe { color: #38a169; }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <a href="index.html" class="back-btn">
                <span>◀</span> العودة للرئيسية
            </a>
            <h1>مقارنة مقاسات <span>الإطارات</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="calculator-box">
            
            <div class="tyre-sections">
                <!-- الإطار القديم -->
                <div>
                    <div class="tyre-title">🚗 المقاس الحالي (القديم)</div>
                    <div class="form-group">
                        <label>العرض (مثال: 205):</label>
                        <input type="number" id="w1" inputmode="numeric" placeholder="205">
                    </div>
                    <div class="form-group">
                        <label>الارتفاع (مثال: 55):</label>
                        <input type="number" id="a1" inputmode="numeric" placeholder="55">
                    </div>
                    <div class="form-group">
                        <label>الجنط (مثال: 16):</label>
                        <input type="number" id="r1" inputmode="numeric" placeholder="16">
                    </div>
                </div>

                <!-- الإطار الجديد -->
                <div>
                    <div class="tyre-title">✨ المقاس المراد تركيبه</div>
                    <div class="form-group">
                        <label>العرض (مثال: 215):</label>
                        <input type="number" id="w2" inputmode="numeric" placeholder="215">
                    </div>
                    <div class="form-group">
                        <label>الارتفاع (مثال: 60):</label>
                        <input type="number" id="a2" inputmode="numeric" placeholder="60">
                    </div>
                    <div class="form-group">
                        <label>الجنط (مثال: 17):</label>
                        <input type="number" id="r2" inputmode="numeric" placeholder="17">
                    </div>
                </div>
            </div>

            <button class="calc-btn" onclick="compareTyres()">قارن المقاسات الآن 🛞</button>

            <div class="results-box" id="results">
                <div class="result-row">
                    <span class="label">الفرق في القطر الإجمالي:</span>
                    <span id="diffDiameter" class="diff">0 ملم</span>
                </div>
                <div class="result-row">
                    <span class="label">النسبة المئوية للاختلاف:</span>
                    <span id="diffPercent" class="diff">0%</span>
                </div>
                <div class="result-row">
                    <span class="label">توصية الحسبة:</span>
                    <span id="tyreAdvice" class="diff" style="font-size: 14px;">-</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        function compareTyres() {
            const w1 = parseFloat(document.getElementById('w1').value);
            const a1 = parseFloat(document.getElementById('a1').value);
            const r1 = parseFloat(document.getElementById('r1').value);
            
            const w2 = parseFloat(document.getElementById('w2').value);
            const a2 = parseFloat(document.getElementById('a2').value);
            const r2 = parseFloat(document.getElementById('r2').value);

            if ([w1, a1, r1, w2, a2, r2].some(isNaN)) {
                alert("الرجاء إدخال كافة المقاسات بشكل صحيح");
                return;
            }

            // قانون حساب القطر الإجمالي للكفر بالملم
            const dia1 = (w1 * (a1 / 100) * 2) + (r1 * 25.4);
            const dia2 = (w2 * (a2 / 100) * 2) + (r2 * 25.4);

            const diffMmM = dia2 - dia1;
            const percentage = (diffMmM / dia1) * 100;

            document.getElementById('diffDiameter').innerText = (diffMmM > 0 ? "+" : "") + diffMmM.toFixed(1) + " ملم";
            
            const pText = document.getElementById('diffPercent');
            pText.innerText = (percentage > 0 ? "+" : "") + percentage.toFixed(2) + "%";

            const advice = document.getElementById('tyreAdvice');
            
            // قاعدة السلامة العالمية للكفرات (الفرق يجب أن لا يتجاوز 3%)
            if (Math.abs(percentage) <= 3) {
                pText.className = "diff safe";
                advice.className = "diff safe";
                advice.innerText = "✅ مقاس آمن ومناسب للتركيب، الفرق ضمن الحدود المسموحة (أقل من 3%).";
            } else {
                pText.className = "diff";
                advice.className = "diff";
                advice.innerText = "❌ لا ينصح بالتركيب! الفرق كبير ويتجاوز 3%، قد يؤثر على ثبات السيارة.";
            }

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>

</html>
