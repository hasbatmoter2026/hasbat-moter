<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول استهلاك الوقود الذكي | حسبة موتر</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --text-main: #2d3748;
            --text-muted: #718096;
            --card-bg: #ffffff;
            --body-bg: #f7fafc;
            --radius: 16px;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            --accent-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--body-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: var(--bg-gradient);
            color: #ffffff;
            padding: 24px 0 60px 0;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            text-align: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .back-btn:hover { background-color: rgba(255, 255, 255, 0.25); transform: translateX(4px); }

        header h1 { font-size: 26px; font-weight: 900; }
        header h1 span { color: var(--accent-color); }

        .calculator-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px 24px;
            box-shadow: var(--shadow);
            margin-top: -30px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 15px;
            color: #4a5568;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            text-align: right;
        }

        .form-group input:focus { border-color: var(--primary-color); }

        /* قمنا بتغيير اسم الفئة هنا لإجبار المتصفح على قراءة التنسيق الجديد */
        .submit-calc-btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-calc-btn:hover { background-color: var(--primary-hover); }

        .results-box {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px dashed #edf2f7;
            display: none;
        }

        .result-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 12px;
        }

        .result-card h4 {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-card .value {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary-color);
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <a href="index.html" class="back-btn"><span>◀</span> العودة للرئيسية</a>
            <h1>محول استهلاك <span>الوقود</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="calculator-box">
            
            <div class="form-group">
                <label for="inputValue">أدخل القيمة المراد تحويلها:</label>
                <input type="number" id="inputValue" inputmode="decimal" placeholder="مثال: 15" step="0.1" min="0.1">
            </div>

            <div class="form-group">
                <label for="conversionType">نظام القياس الحالي المدخل:</label>
                <select id="conversionType">
                    <option value="kml">كم لكل لتر (Km/L) - الخليجي</option>
                    <option value="l100">لتر لكل 100 كم (L/100km) - الأوروبي</option>
                    <option value="mpg">ميل لكل جالون (MPG) - الأمريكي</option>
                </select>
            </div>

            <!-- الزر المحدث باسم الفئة الجديد وبدون الأيقونة المكررة والمشوهة -->
            <button class="submit-calc-btn" onclick="convertFuel()">حوّل الأنظمة الآن 🔄</button>

            <div class="results-box" id="results">
                
                <div class="result-card">
                    <h4>النظام الخليجي المعتمد:</h4>
                    <div class="value" id="resKml">0 كم / لتر</div>
                </div>

                <div class="result-card">
                    <h4>النظام الأوروبي:</h4>
                    <div class="value" id="resL100">0 لتر / 100 كم</div>
                </div>

                <div class="result-card">
                    <h4>النظام الأمريكي:</h4>
                    <div class="value" id="resMpg">0 ميل / جالون</div>
                </div>

            </div>

        </div>
    </main>

    <script>
        function convertFuel() {
            const val = parseFloat(document.getElementById('inputValue').value);
            const type = document.getElementById('conversionType').value;

            if (isNaN(val) || val <= 0) {
                alert("الرجاء إدخال قيمة صحيحة أكبر من الصفر");
                return;
            }

            let kml, l100, mpg;

            if (type === "kml") {
                kml = val;
                l100 = 100 / val;
                mpg = val * 2.35214583;
            } else if (type === "l100") {
                kml = 100 / val;
                l100 = val;
                mpg = 235.214583 / val;
            } else if (type === "mpg") {
                kml = val / 2.35214583;
                l100 = 235.214583 / val;
                mpg = val;
            }

            document.getElementById('resKml').innerText = kml.toFixed(2) + " كم / لتر";
            document.getElementById('resL100').innerText = l100.toFixed(2) + " لتر / 100 كم";
            document.getElementById('resMpg').innerText = mpg.toFixed(2) + " ميل / جالون (MPG)";

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>

</html>
